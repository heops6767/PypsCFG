name: Build Super Filtered Subscriptions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'BlackList'
      - 'WhiteList'
      - 'FavoriteSubBlack'
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Super Filter Script
        run: python scripts/sort_protocols.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Добавляем все изменения
          git add output/ reports/
          
          # Если изменений нет — выходим
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update: Filtred protocols [$(date +'%d.%m.%Y %H:%M')]"
          
          # СТРАТЕГИЯ: Забираем данные из репозитория, 
          # но при любом конфликте В ПРИОРИТЕТЕ наши новые файлы (-X ours)
          git pull --rebase -X ours origin main
          
          # Силовая отправка, если ребейз прошел
          git push origin main
