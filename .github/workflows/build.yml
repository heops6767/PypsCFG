name: Build subscriptions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'output/**'
      - 'reports/**'
      - 'cache/**'
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

concurrency:
  group: pypscfg-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build fast lists
        run: python scripts/build_subs.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            output/
            reports/

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ reports/
          git diff --cached --quiet && exit 0
          git commit -m "Update generated subscriptions"
          git pull --rebase origin main
          git push
