name: Build checked subscriptions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */10 * * *' 

permissions:
  contents: write

jobs:
  build-checked:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build checked lists
        run: |
          python scripts/build_checked.py

      - name: Upload checked artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-checked-output
          path: |
            output/
            reports/
            cache/

      - name: Commit checked generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ reports/ cache/
          git diff --cached --quiet || git commit -m "Update checked subscriptions"
          git push
